context:
  version: "0.20"

package:
  name: otmixmod
  version: ${{ version }}

source:
  url: https://github.com/openturns/otmixmod/archive/v${{ version }}.tar.gz
  sha256: aab968bbf9a233db25ed5ccd5b1b05d478e731287d8d85bd09119ca4b459ade2
  patches:
    - 0001-Export-symbols.patch

build:
  number: 3
  python:
    version_independent: true

requirements:
  build:
    - cmake
    - swig
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - if: unix
      then: make
      else: ninja
    - if: win
      then: m2-diffutils
    - if: build_platform != target_platform
      then:
        - python-abi3 ${{ python_min }}.*
        - python ${{ python_min }}.*
        - cross-python_${{ target_platform }}
  host:
    - python-abi3 ${{ python_min }}.*
    - python ${{ python_min }}.*
    - openturns
    - libmixmod
  run:
    - python >=${{ python_min }}
  run_exports:
    - ${{ pin_subpackage('otmixmod', upper_bound='x.x') }}

tests:
  - python:
      imports:
        - otmixmod

about:
  homepage: http://openturns.org/
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: COPYING
  summary: MixMod module
  documentation: https://openturns.github.io/otmixmod/master/
  repository: https://github.com/openturns/otmixmod

extra:
  recipe-maintainers:
    - jschueller
